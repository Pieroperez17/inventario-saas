# ============================================================================
#  Orquestación del Sistema de Inventario SaaS
#  Servicios: db (PostgreSQL) · api (backend Node/Express).
#  El servicio `web` (frontend React) se incorpora en la Fase 4.
#
#  Uso:  docker compose up --build
# ============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: inventario_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: inventario
      POSTGRES_PASSWORD: inventario
      POSTGRES_DB: inventario_db
    ports:
      - "5432:5432"
    volumes:
      - datos_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventario -d inventario_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventario_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: "postgresql://inventario:inventario@db:5432/inventario_db?schema=public"
      JWT_ACCESO_SECRETO: "cambia-esto-en-produccion-acceso-0a1b2c3d4e5f6g7h"
      JWT_ACCESO_EXPIRA: "15m"
      JWT_REFRESH_SECRETO: "cambia-esto-en-produccion-refresh-9z8y7x6w5v4u3t2s"
      JWT_REFRESH_EXPIRA: "7d"
      CORS_ORIGEN: "http://localhost:5173"
      ZONA_HORARIA: "America/Lima"
      # Sembrar datos demo automáticamente al primer arranque.
      SEMBRAR_AL_INICIAR: "true"
    ports:
      - "4000:4000"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventario_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  datos_postgres:
